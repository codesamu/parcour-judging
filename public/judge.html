<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="judge-page">
    <!-- Login View -->
    <div id="login-view" class="container">
        <header>
            <h1>Judge Login</h1>
        </header>
        <main>
            <form id="login-form" class="card">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="pin">PIN</label>
                    <input type="password" id="pin" inputmode="numeric" required>
                </div>
                <button type="submit" class="btn-primary w-full">Login</button>
                <div id="login-error" class="error hidden"></div>
            </form>
        </main>
        <footer class="mt-4">
            <a href="/" class="btn-secondary btn-small">View Leaderboard</a>
        </footer>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="container hidden">
        <header class="flex-between">
            <h2>Welcome, <span id="judge-name-display"></span></h2>
            <button id="logout-btn" class="btn-secondary btn-small">Logout</button>
        </header>
        <main>
            <div id="status-bar" class="status-bar">
                <!-- System status like "Waiting for others..." -->
            </div>

            <!-- Current Athlete Section -->
            <section class="card mb-4" id="current-athlete-section">
                <h3>Current Athlete</h3>
                <div id="current-athlete-info" class="mb-4">
                    <h2 id="athlete-name" class="highlight-text">Loading...</h2>
                </div>
                <div class="score-input-container">
                    <label for="score-input">Your Score</label>
                    <input type="number" id="score-input" class="large-input" min="0" max="100" step="1">
                </div>
                <button id="submit-score-btn" class="btn-primary w-full mt-2">Submit Score</button>
                <div id="score-status" class="status-text hidden"></div>
            </section>

            <!-- Past Athletes (Edit Scores) Section -->
            <section class="card">
                <h3>All Athletes (Edit Scores)</h3>
                <p class="text-sm opacity-70 mb-2">You can update your score for any athlete here. Edits will immediately reflect on the leaderboard.</p>
                <div id="athletes-list" class="athletes-list">
                    <!-- Populated via JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Score Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content card">
            <h3>Edit Score</h3>
            <p>Athlete: <span id="edit-athlete-name" class="font-bold"></span></p>
            <input type="hidden" id="edit-athlete-id">
            <div class="form-group mt-2">
                <label for="edit-score-input">New Score</label>
                <input type="number" id="edit-score-input" class="large-input" min="0" max="100" step="1">
            </div>
            <div class="flex-between mt-4">
                <button id="cancel-edit-btn" class="btn-secondary">Cancel</button>
                <button id="save-edit-btn" class="btn-primary">Save Score</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initJudge();
        });
    </script>
</body>
</html>
