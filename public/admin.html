<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body class="admin-page">
    <!-- Login View -->
    <div id="login-view" class="container">
        <header>
            <h1>Admin Login</h1>
        </header>
        <main>
            <form id="admin-login-form" class="card">
                <div class="form-group">
                    <label for="admin-pin">Admin password</label>
                    <input type="password" id="admin-pin" inputmode="numeric" required>
                </div>
                <button type="submit" class="btn-primary w-full">Login</button>
                <div id="login-error" class="error hidden"></div>
            </form>
        </main>
        <footer class="mt-4">
            <a href="/" class="btn-secondary btn-small">View Leaderboard</a>
        </footer>
    </div>

    <!-- Admin Dashboard View -->
    <div id="admin-view" class="container hidden">
        <header class="flex-between">
            <h2>Admin Panel</h2>
            <button id="logout-btn" class="btn-secondary btn-small">Logout</button>
        </header>
        <main>
            <section class="card mb-4">
                <h3>Add Athlete</h3>
                <form id="add-athlete-form" class="flex-row">
                    <input type="text" id="athlete-name-input" placeholder="Athlete Name" required class="flex-grow">
                    <button type="submit" class="btn-primary">Add</button>
                </form>
            </section>

            <section class="card mb-4">
                <h3>Manage Athletes</h3>
                <div id="admin-athletes-list" class="athletes-list">
                    <!-- Populated via JS -->
                </div>
            </section>

            <section class="card mb-4">
                <h3>Manage Judges</h3>
                <form id="add-judge-form" class="flex-row mb-4">
                    <input type="text" id="judge-username-input" placeholder="Judge Name" required class="flex-grow">
                    <input type="text" id="judge-pin-input" placeholder="PIN" required style="width: 100px;">
                    <button type="submit" class="btn-primary">Add</button>
                </form>
                <div id="admin-judges-list" class="athletes-list">
                    <!-- Populated via JS -->
                </div>
            </section>

            <section class="card danger-zone">
                <h3>Danger Zone</h3>
                <p class="text-sm mb-2">This will delete all athletes and scores. Cannot be undone.</p>
                <button id="reset-competition-btn" class="btn-danger w-full">Reset Competition</button>
            </section>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAdmin();
        });
    </script>
</body>

</html>
