<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAX Austria</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body class="leaderboard-page">
    <div class="container">
        <header>
            <h1>VAX Austria</h1>
        </header>
        
        <div class="tabs mb-4">
            <button id="tab-leaderboard" class="tab-btn active">Leaderboard</button>
            <button id="tab-startlist" class="tab-btn">Starting List</button>
            <button id="tab-split" class="tab-btn">Split View</button>
        </div>

        <main>
            <!-- Leaderboard Tab Content -->
            <div id="leaderboard-tab-content">
                <div id="leaderboard-list" class="leaderboard-list">
                    <!-- Leaderboard items injected here via JS -->
                </div>
                <div id="no-leaderboard-data" class="hidden text-center">
                    <p>No athletes have completed their runs yet.</p>
                </div>
            </div>

            <!-- Starting List Tab Content -->
            <div id="startlist-tab-content" class="hidden">
                <div id="startlist-list" class="leaderboard-list">
                    <!-- Starting list items injected here via JS -->
                </div>
                <div id="no-startlist-data" class="hidden text-center">
                    <p>No athletes added yet.</p>
                </div>
            </div>
        </main>
        <footer>
            <a href="/judge" class="btn-secondary btn-small">Judge Login</a>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initLeaderboard();
        });
    </script>
</body>

</html>
